[package]
name = "sdkwork-agentstudio-studio-service-host"
version = "0.1.0"
edition = "2021"

[lib]
name = "sdkwork_agentstudio_host_studio"
path = "src/lib.rs"

[dependencies]
sdkwork-agentstudio-service-host.workspace = true
sdkwork-utils-rust.workspace = true
reqwest = { version = "0.13", default-features = false, features = ["blocking", "json", "rustls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
time = { version = "0.3", features = ["formatting"] }
tokio = { version = "1", features = ["rt", "rt-multi-thread"] }
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
tempfile = "3"

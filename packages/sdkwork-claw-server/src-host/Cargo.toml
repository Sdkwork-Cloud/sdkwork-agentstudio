[package]
name = "sdkwork-claw-server"
version = "0.1.0"
edition = "2021"
autobins = false

[[bin]]
name = "claw-server"
path = "src/main.rs"

[dependencies]
axum = "0.8"
base64 = "0.22"
clap = { version = "4.6", features = ["derive"] }
sdkwork-claw-host-core.workspace = true
sdkwork-claw-host-studio.workspace = true
reqwest = { version = "0.13", default-features = false, features = ["http2", "json", "rustls", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tower = { version = "0.5", features = ["util"] }

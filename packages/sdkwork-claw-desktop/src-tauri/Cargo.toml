[package]
name = "sdkwork-claw-desktop"
version = "0.1.0"
edition = "2021"

[lib]
name = "sdkwork_claw_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dependencies]
async-stream = "0.3"
axum = "0.8"
dirs = "6.0.0"
image = { version = "0.25", default-features = false, features = ["png"] }
jsonwebtoken = "10.3"
json5 = "1.3"
postgres = "0.19.13"
reqwest = { version = "0.13", default-features = false, features = ["blocking", "http2", "json", "rustls", "stream"] }
rusqlite = { version = "0.39.0", features = ["bundled"] }
sdkwork-claw-host-core = { path = "../../sdkwork-claw-host-core/src-host" }
sdkwork-claw-host-studio = { path = "../../sdkwork-claw-host-studio/src-host" }
sdkwork-claw-server = { path = "../../sdkwork-claw-server/src-host" }
sdkwork-local-api-proxy-native = { path = "../../../../sdkwork-local-router/packages/pc-react/intelligence/sdkwork-local-api-proxy/native/tauri-rust" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sha2 = "0.11"
sysinfo = "0.38"
sys-locale = "0.3"
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-dialog = "2"
tauri-plugin-notification = "2"
tauri-plugin-opener = "2"
tauri-plugin-single-instance = "2"
time = { version = "0.3", features = ["formatting"] }
tokio = { version = "1", features = ["rt-multi-thread", "sync", "net", "time"] }
toml_edit = "0.25"
uuid = { version = "1", features = ["v4"] }
xcap = "0.9.3"
zip = { version = "0.6.6", default-features = false, features = ["deflate"] }

[dev-dependencies]
tempfile = "3"

[target.'cfg(windows)'.dependencies]
windows-service = "0.8.0"
windows-sys = { version = "0.61", features = ["Win32_Foundation", "Win32_System_Threading"] }
winreg = "0.56"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

[patch.crates-io]
xcap = { path = "vendor/xcap" }

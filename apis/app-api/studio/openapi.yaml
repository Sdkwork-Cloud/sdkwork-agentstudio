                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StudioInstanceDetailNullableRecord'
        '500':
          description: The studio instance detail record could not be projected.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
        '503':
          description: The canonical studio public API is not available for the active host shell.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
  /claw/api/v1/studio/instances/{id}/config:

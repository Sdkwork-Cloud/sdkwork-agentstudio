components:
  parameters:
    StudioInstanceId:
      name: id
      in: path
      required: true
      description: Studio instance identifier.
      schema:
        type: string
    StudioSessionId:
      name: sessionId
      in: path
      required: true
      description: Kernel chat session identifier.
      schema:
        type: string
    StudioRunId:
      name: runId
      in: path
      required: true
      description: Canonical studio kernel chat run identifier.
      schema:
        type: string
    StudioTaskId:
      name: taskId
      in: path
      required: true
      description: Managed studio workbench task identifier.
      schema:
        type: string
    StudioFileId:
      name: fileId
      in: path
      required: true
      description: Managed studio workbench file identifier.
      schema:
        type: string
    StudioProviderId:
      name: providerId
      in: path
      required: true
      description: Managed studio workbench LLM provider identifier.
      schema:
        type: string
    StudioConversationId:
      name: conversationId
      in: path
      required: true
      description: Studio conversation identifier.
      schema:
        type: string
  requestBodies:
    CreateStudioInstance:
      required: true
      description: Studio instance creation payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StudioCreateInstanceInput'
    UpdateStudioInstance:
      required: true
      description: Studio instance update payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StudioUpdateInstanceInput'
    StudioInstanceAction:
      required: false
      description: Optional studio instance action payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StudioInstanceActionInput'
    UpdateStudioInstanceConfig:
      required: true
      description: Studio instance config payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StudioInstanceConfigRecord'
    UpsertStudioConversation:
      required: true
      description: Studio conversation payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StudioConversationRecord'
    CreateKernelChatSession:
      required: true
      description: Kernel chat session creation payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StudioCreateKernelChatSessionInput'
    PatchKernelChatSession:
      required: true
      description: Kernel chat session patch payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StudioPatchKernelChatSessionInput'
    KernelChatSessionAction:
      required: false
      description: Kernel chat session action payload (e.g. run start or abort).
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/StudioStartKernelChatRunInput'
              - $ref: '#/components/schemas/StudioAbortKernelChatRunInput'
    InvokeStudioOpenClawGateway:
      required: true
      description: OpenClaw gateway invocation payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StudioOpenClawGatewayInvokePayload'
    MutateStudioTask:
      required: true
      description: Managed studio workbench task payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StudioTaskMutationInput'
    StudioTaskAction:
      required: false
      description: Optional managed studio workbench task action request.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/StudioTaskCloneInput'
              - $ref: '#/components/schemas/StudioTaskStatusInput'
    UpdateStudioFileContent:
      required: true
      description: Managed studio workbench file content update request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StudioFileContentUpdateInput'
    UpdateStudioLlmProvider:
      required: true
      description: Managed studio workbench LLM provider update request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StudioUpdateInstanceLlmProviderConfigInput'
  schemas:
    PublicApiDiscoveryRecord:
      type: object
      description: Public native API discovery metadata.
      properties:
        family:
          type: string
        version:
          type: string
        basePath:
          type: string
        hostMode:
          type: string
        hostVersion:
          type: string
        openapiDocumentUrl:
          type: string
        healthLiveUrl:
          type: string
        healthReadyUrl:
          type: string
        capabilityKeys:
          type: array
          items:
            type: string
        generatedAt:
          type: integer
          format: uint64
          minimum: 0
    StudioInstanceRecord:
      type: object
      description: Studio instance projection surfaced by the canonical host public API.
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type:
            - string
            - "null"
        status:
          type: string
        isBuiltIn:
          type: boolean
        isDefault:
          type: boolean
        baseUrl:
          type:
            - string
            - "null"
        websocketUrl:
          type:
            - string
            - "null"
      additionalProperties: true
    StudioInstanceNullableRecord:
      oneOf:
        - $ref: '#/components/schemas/StudioInstanceRecord'
        - type: "null"
    StudioCreateInstanceInput:
      type: object
      required:
        - name
        - runtimeKind
        - deploymentMode
        - transportKind
      properties:
        name:
          type: string
        description:
          type:
            - string
            - "null"
        runtimeKind:
          type: string
        deploymentMode:
          type: string
        transportKind:
          type: string
        iconType:
          type:
            - string
            - "null"
        version:
          type:
            - string
            - "null"
        typeLabel:
          type:
            - string
            - "null"
        host:
          type:
            - string
            - "null"
        port:
          type:
            - integer
            - "null"
          minimum: 0
        baseUrl:
          type:
            - string
            - "null"
        websocketUrl:
          type:
            - string
            - "null"
        storage:
          type:
            - object
            - "null"
          additionalProperties: true
        config:
          type:
            - object
            - "null"
          additionalProperties: true
    StudioUpdateInstanceInput:
      type: object
      properties:
        name:
          type:
            - string
            - "null"
        description:
          type:
            - string
            - "null"
        iconType:
          type:
            - string
            - "null"
        version:
          type:
            - string
            - "null"
        typeLabel:
          type:
            - string
            - "null"
        host:
          type:
            - string
            - "null"
        port:
          type:
            - integer
            - "null"
          minimum: 0
        baseUrl:
          type:
            - string
            - "null"
        websocketUrl:
          type:
            - string
            - "null"
        status:
          type:
            - string
            - "null"
        isDefault:
          type:
            - boolean
            - "null"
        config:
          type:
            - object
            - "null"
          additionalProperties: true
    StudioInstanceActionInput:
      type: object
      description: Generic studio instance lifecycle action payload.
      properties:
        action:
          type: string
          description: Lifecycle action discriminator (e.g. start, stop, restart).
        args:
          type:
            - object
            - "null"
          additionalProperties: true
      required:
        - action
    StudioInstanceDeleteResult:
      type: boolean
      description: Whether the requested canonical studio instance was deleted.
    StudioInstanceDetailRecord:
      type: object
      properties:
        instance:
          $ref: '#/components/schemas/StudioInstanceRecord'
        config:
          type: object
          additionalProperties: true
        logs:
          type: string
        health:
          type: object
          additionalProperties: true
        lifecycle:
          type: object
          additionalProperties: true
        storage:
          type: object
          additionalProperties: true
        connectivity:
          type: object
          additionalProperties: true
        observability:
          type: object
          additionalProperties: true
        dataAccess:
          type: object
          additionalProperties: true
        artifacts:
          type: array
          items:
            type: object
            additionalProperties: true
        capabilities:
          type: array
          items:
            type: object
            additionalProperties: true
        officialRuntimeNotes:
          type: array
          items:
            type: object
            additionalProperties: true
        consoleAccess:
          type:
            - object
            - "null"
          additionalProperties: true
        workbench:
          type:
            - object
            - "null"
          additionalProperties: true
      additionalProperties: true
    StudioInstanceDetailNullableRecord:
      oneOf:
        - $ref: '#/components/schemas/StudioInstanceDetailRecord'
        - type: "null"
    StudioInstanceConfigRecord:
      type: object
      properties:
        port:
          type: string
        sandbox:
          type: boolean
        autoUpdate:
          type: boolean
        logLevel:
          type: string
        corsOrigins:
          type: string
        workspacePath:
          type:
            - string
            - "null"
        baseUrl:
          type:
            - string
            - "null"
        websocketUrl:
          type:
            - string
            - "null"
        authToken:
          type:
            - string
            - "null"
      additionalProperties: true
    StudioInstanceConfigNullableRecord:
      oneOf:
        - $ref: '#/components/schemas/StudioInstanceConfigRecord'
        - type: "null"
    StudioInstanceLogsRecord:
      type: string
      description: Studio instance logs projection surfaced by the canonical host public API.
    StudioNullResult:
      type: "null"
      description: The canonical studio public API completed the requested mutation without a response payload.
    StudioWorkbenchMutationResult:
      type: boolean
      description: Whether the requested managed studio workbench mutation changed persisted state.
    StudioOpenClawGatewayInvokePayload:
      type: object
      required:
        - request
      properties:
        request:
          $ref: '#/components/schemas/StudioOpenClawGatewayInvokeRequest'
        options:
          $ref: '#/components/schemas/StudioOpenClawGatewayInvokeOptions'
    StudioOpenClawGatewayInvokeRequest:
      type: object
      required:
        - tool
      properties:
        tool:
          type: string
        action:
          type:
            - string
            - "null"
        args:
          type:
            - object
            - "null"
          additionalProperties: true
        sessionKey:
          type:
            - string
            - "null"
        dryRun:
          type:
            - boolean
            - "null"
    StudioOpenClawGatewayInvokeOptions:
      type: object
      properties:
        messageChannel:
          type:
            - string
            - "null"
        accountId:
          type:
            - string
            - "null"
        headers:
          type: object
          additionalProperties:
            type: string
    StudioOpenClawGatewayInvokeResult:
      type: object
      additionalProperties: true
      description: OpenClaw gateway invocation result payload.
    StudioCreateKernelChatSessionInput:
      type: object
      required:
        - instanceId
      properties:

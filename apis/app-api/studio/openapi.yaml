        '500':
          description: The studio conversation list could not be projected.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
        '503':
          description: The canonical studio public API is not available for the active host shell.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
  /claw/api/v1/studio/conversations/{conversationId}:
    parameters:
      - $ref: '#/components/parameters/StudioConversationId'
    put:
      tags: [studio.conversations]
      operationId: studio.conversations.update
      summary: Create or replace one studio conversation projected by the active host shell
      x-sdkwork-auth-mode: anonymous
      requestBody:
        $ref: '#/components/requestBodies/UpsertStudioConversation'
      responses:
        '200':
          description: Stored canonical studio conversation record.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkApiResponse
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StudioConversationRecord'
        '400':
          description: The studio conversation payload was invalid.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
        '500':
          description: The studio conversation record could not be projected.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
        '503':
          description: The canonical studio public API is not available for the active host shell.

    parameters:
      - $ref: '#/components/parameters/StudioInstanceId'
    get:
      tags: [studio.kernel-chat]
      operationId: studio.kernel-chat.agent-profiles.list
      summary: List kernel chat agent profiles for one studio instance
      x-sdkwork-auth-mode: anonymous
      parameters:
        - $ref: ../../schemas/sdkwork-common.yaml#/components/parameters/PageQuery
        - $ref: ../../schemas/sdkwork-common.yaml#/components/parameters/PageSizeQuery
      responses:
        '200':
          description: Kernel chat agent profiles projected for the requested studio instance.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkApiResponse
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/KernelChatAgentProfile'
                          pageInfo:
                            $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/PageInfo
        '500':
          description: The kernel chat agent profiles could not be listed.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
        '503':

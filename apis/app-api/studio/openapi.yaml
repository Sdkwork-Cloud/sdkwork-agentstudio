        '503':
          description: The canonical studio public API is not available for the active host shell.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
    post:
      tags: [studio.kernel-chat]
      operationId: studio.kernel-chat.sessions.invoke.create
      summary: Invoke a generic action on one kernel chat session (e.g. run, abort)
      x-sdkwork-auth-mode: anonymous
      requestBody:
        $ref: '#/components/requestBodies/KernelChatSessionAction'
      responses:
        '201':
          description: Kernel chat session action result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkApiResponse
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - $ref: '#/components/schemas/KernelChatSession'
                          - $ref: '#/components/schemas/KernelChatRun'
                          - $ref: '#/components/schemas/StudioWorkbenchMutationResult'
        '400':
          description: The kernel chat session action payload was invalid.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
        '500':
          description: The kernel chat session action could not be completed.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
        '503':
          description: The canonical studio public API is not available for the active host shell.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
  /claw/api/v1/studio/instances/{id}/kernel-chat/sessions/{sessionId}/runs:
    parameters:
      - $ref: '#/components/parameters/StudioInstanceId'
      - $ref: '#/components/parameters/StudioSessionId'
    get:
      tags: [studio.kernel-chat]
      operationId: studio.kernel-chat.runs.list
      summary: List kernel chat runs for one studio instance session

openapi: 3.1.2
info:
  title: SdkWork Agent Studio App API
  version: v1
  description: >-
    Authored OpenAPI contract for the Studio public app-api surface
    (`/claw/api/v1/...`). SDKWork-owned custom API; success responses use the
    `SdkWorkApiResponse` envelope and errors use `application/problem+json`
    with `SdkWorkProblemDetail` (API_SPEC.md §15). Auth mode: `anonymous`.
  x-sdkwork-surface: app-api
  x-sdkwork-auth-mode: anonymous
servers:
  - url: /
    description: Same-origin Claw server
tags:
  - name: studio
    description: Studio public bootstrap and instance management APIs.
  - name: studio.kernel-chat
    description: Studio kernel chat session, run, and message APIs.
  - name: studio.workbench
    description: Studio workbench task, file, and LLM provider APIs.
  - name: studio.conversations
    description: Studio conversation persistence APIs.
  - name: studio.gateway
    description: Studio OpenClaw gateway invocation APIs.
paths:
  /claw/api/v1/discovery:
    get:
      tags: [studio]
      operationId: studio.discovery.list
      summary: Read public native API discovery metadata
      x-sdkwork-auth-mode: anonymous
      responses:
        '200':
          description: Public native API discovery metadata.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkApiResponse
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PublicApiDiscoveryRecord'
        '503':
          description: The canonical studio public API is not available for the active host shell.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
  /claw/api/v1/studio/instances:
    get:
      tags: [studio]
      operationId: studio.instances.list
      summary: List studio instances projected by the active host shell
      x-sdkwork-auth-mode: anonymous
      parameters:
        - $ref: ../../schemas/sdkwork-common.yaml#/components/parameters/PageQuery
        - $ref: ../../schemas/sdkwork-common.yaml#/components/parameters/PageSizeQuery
      responses:
        '200':
          description: Current canonical studio instance records.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkApiResponse
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/StudioInstanceRecord'
                          pageInfo:
                            $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/PageInfo
        '500':
          description: The studio instance list could not be projected.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
        '503':
          description: The canonical studio public API is not available for the active host shell.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
    post:
      tags: [studio]
      operationId: studio.instances.create
      summary: Create one studio instance through the active host shell
      x-sdkwork-auth-mode: anonymous
      requestBody:
        $ref: '#/components/requestBodies/CreateStudioInstance'
      responses:
        '201':
          description: Created canonical studio instance record.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkApiResponse
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StudioInstanceRecord'
        '400':
          description: The studio instance creation payload was invalid.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
        '500':
          description: The studio instance could not be created.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
        '503':
          description: The canonical studio public API is not available for the active host shell.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
  /claw/api/v1/studio/instances/{id}:
    parameters:
      - $ref: '#/components/parameters/StudioInstanceId'
    get:
      tags: [studio]
      operationId: studio.instances.retrieve
      summary: Read one studio instance projected by the active host shell
      x-sdkwork-auth-mode: anonymous
      responses:
        '200':
          description: Requested canonical studio instance record or null when the instance does not exist.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkApiResponse
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StudioInstanceNullableRecord'
        '500':
          description: The studio instance record could not be projected.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
        '503':
          description: The canonical studio public API is not available for the active host shell.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
    put:
      tags: [studio]
      operationId: studio.instances.update
      summary: Update one studio instance through the active host shell
      x-sdkwork-auth-mode: anonymous
      requestBody:
        $ref: '#/components/requestBodies/UpdateStudioInstance'
      responses:
        '200':
          description: Updated canonical studio instance record.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkApiResponse
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StudioInstanceRecord'
        '400':
          description: The studio instance update payload was invalid.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
        '500':
          description: The studio instance could not be updated.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
        '503':
          description: The canonical studio public API is not available for the active host shell.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
    delete:
      tags: [studio]
      operationId: studio.instances.delete
      summary: Delete one studio instance through the active host shell
      x-sdkwork-auth-mode: anonymous
      responses:
        '204':
          description: Deleted
        '500':
          description: The studio instance could not be deleted.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
        '503':
          description: The canonical studio public API is not available for the active host shell.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
    post:
      tags: [studio]
      operationId: studio.instances.invoke.create
      summary: Invoke a generic lifecycle action on one studio instance
      x-sdkwork-auth-mode: anonymous
      requestBody:
        $ref: '#/components/requestBodies/StudioInstanceAction'
      responses:
        '201':
          description: Updated canonical studio instance record after the action.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkApiResponse
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StudioInstanceRecord'
        '400':
          description: The studio instance action payload was invalid.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
        '500':
          description: The studio instance action could not be completed.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
        '503':
          description: The canonical studio public API is not available for the active host shell.
          content:
            application/problem+json:
              schema:
                $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkProblemDetail
  /claw/api/v1/studio/instances/{id}/detail:
    parameters:

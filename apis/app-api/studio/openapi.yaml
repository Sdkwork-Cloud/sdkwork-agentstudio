      - $ref: '#/components/parameters/StudioSessionId'
    get:
      tags: [studio.kernel-chat]
      operationId: studio.kernel-chat.sessions.retrieve
      summary: Read one kernel chat session for one studio instance
      x-sdkwork-auth-mode: anonymous
      responses:
        '200':
          description: Requested kernel chat session or null when the session does not exist.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkApiResponse

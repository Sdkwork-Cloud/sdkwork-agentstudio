        '200':
          description: Current canonical studio conversation records for the requested instance.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../../schemas/sdkwork-common.yaml#/components/schemas/SdkWorkApiResponse
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/StudioConversationRecord'

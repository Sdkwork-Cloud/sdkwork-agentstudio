openapi: 3.1.2
info:
  title: Local AI Compatibility Proxy API
  version: v1
  description: >-
    Authored OpenAPI contract for the local AI compatibility proxy surface.
    Vendor-compatibility API: every operation declares
    `x-sdkwork-wire-protocol: external` with
    `x-sdkwork-external-protocol-id: local-ai-compat-v1` (API_SPEC.md §4.5.2).
    Routes mirror upstream provider wire (OpenAI `/v1/*`, Google
    `/v1beta/*`, Anthropic `/anthropic/v1/*`, plus `/health`). Request and
    response bodies are opaque provider-compatible JSON and do NOT use the
    `SdkWorkApiResponse` envelope.
  x-sdkwork-surface: open-api
  x-sdkwork-external-protocol-id: local-ai-compat-v1
servers:
  - url: /
    description: Same-origin built-in host
tags:
  - name: local-ai-compat
    description: Provider-compatible root-native routes proxied by the built-in host.
paths:
  /health:
    get:
      tags: [local-ai-compat]
      operationId: local-ai-compat.health.get
      summary: Proxy /health through the built-in local AI compatibility surface
      x-sdkwork-wire-protocol: external
      x-sdkwork-external-protocol-id: local-ai-compat-v1
      responses:
        '200':
          description: Compatibility response from the proxied upstream route.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '502':
          description: The local AI compatibility upstream could not be reached.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '503':
          description: The local AI compatibility surface is not active.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

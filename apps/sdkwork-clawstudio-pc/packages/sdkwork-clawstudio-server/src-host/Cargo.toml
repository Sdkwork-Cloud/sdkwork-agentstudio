[package]
name = "sdkwork-clawstudio-server"
version = "0.1.0"
edition = "2021"
autobins = false

[[bin]]
name = "clawstudio-server"
path = "src/main.rs"

[dependencies]
axum = "0.8"
base64 = "0.22"
clap = { version = "4.6", features = ["derive"] }
sdkwork-clawstudio-host-core.workspace = true
sdkwork-clawstudio-host-studio.workspace = true
reqwest = { version = "0.13", default-features = false, features = ["http2", "json", "rustls", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tower = { version = "0.5", features = ["util"] }

# SDKWork web framework integration (18-stage interceptor pipeline, CORS, health, metrics, OpenAPI)
sdkwork-web-bootstrap.workspace = true
sdkwork-web-contract.workspace = true
sdkwork-web-core.workspace = true
sdkwork-web-axum.workspace = true

# SDKWork cross-language utilities (SdkWorkApiResponse, SdkWorkProblemDetail, SdkWorkResultCode, etc.)
sdkwork-utils-rust.workspace = true

# Tracing for structured logging
tracing = "0.1"

# async-trait for WebRequestContextResolver trait implementation
async-trait = "0.1"

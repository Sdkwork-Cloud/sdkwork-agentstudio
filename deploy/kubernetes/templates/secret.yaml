{{- $authSecretName := default (printf "%s-auth" (include "sdkwork-agentstudio.fullname" .)) .Values.auth.existingSecret }}
{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $authSecretName }}
  labels:
    app.kubernetes.io/name: {{ include "sdkwork-agentstudio.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  CLAW_SERVER_MANAGE_USERNAME: {{ required "auth.manageUsername is required when auth.existingSecret is empty" .Values.auth.manageUsername | quote }}
  CLAW_SERVER_MANAGE_PASSWORD: {{ required "auth.managePassword is required when auth.existingSecret is empty" .Values.auth.managePassword | quote }}
{{- if .Values.auth.internalUsername }}
  CLAW_SERVER_INTERNAL_USERNAME: {{ .Values.auth.internalUsername | quote }}
{{- end }}
{{- if .Values.auth.internalPassword }}
  CLAW_SERVER_INTERNAL_PASSWORD: {{ .Values.auth.internalPassword | quote }}
{{- end }}
  AGENT_STUDIO_USER_CENTER_SECRET_ID: {{ .Values.userCenter.secretId | quote }}
  AGENT_STUDIO_USER_CENTER_SHARED_SECRET: {{ .Values.userCenter.sharedSecret | quote }}
  CLAW_SERVER_ALLOW_INSECURE_PUBLIC_BIND: "false"
{{- end }}

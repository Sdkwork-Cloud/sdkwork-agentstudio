services:
  agentstudio-server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: sdkwork-agentstudio-pc-server:local
    restart: unless-stopped
    env_file:
      - profiles/default.env
    environment:
      CLAW_SERVER_MANAGE_USERNAME: ${CLAW_SERVER_MANAGE_USERNAME:?set CLAW_SERVER_MANAGE_USERNAME before starting the public control plane}
      CLAW_SERVER_MANAGE_PASSWORD: ${CLAW_SERVER_MANAGE_PASSWORD:?set CLAW_SERVER_MANAGE_PASSWORD before starting the public control plane}
      CLAW_SERVER_INTERNAL_USERNAME: ${CLAW_SERVER_INTERNAL_USERNAME:-}
      CLAW_SERVER_INTERNAL_PASSWORD: ${CLAW_SERVER_INTERNAL_PASSWORD:-}
      AGENT_STUDIO_USER_CENTER_MODE: ${AGENT_STUDIO_USER_CENTER_MODE:-builtin-local}
      AGENT_STUDIO_USER_CENTER_APP_API_BASE_URL: ${AGENT_STUDIO_USER_CENTER_APP_API_BASE_URL:-}
      AGENT_STUDIO_USER_CENTER_EXTERNAL_BASE_URL: ${AGENT_STUDIO_USER_CENTER_EXTERNAL_BASE_URL:-}
      AGENT_STUDIO_USER_CENTER_SECRET_ID: ${AGENT_STUDIO_USER_CENTER_SECRET_ID:-}
      AGENT_STUDIO_USER_CENTER_SHARED_SECRET: ${AGENT_STUDIO_USER_CENTER_SHARED_SECRET:-}
    ports:
      - "18797:18797"
    volumes:
      - agentstudio-server-data:/var/lib/agentstudio-server

volumes:
  agentstudio-server-data:
